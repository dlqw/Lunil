name: Cross-runtime performance

on:
  workflow_dispatch:
    inputs:
      full-matrix:
        description: Run the complete six-RID matrix with external reference engines
        required: false
        type: boolean
        default: false
      rounds:
        description: Balanced sample rounds per engine and workload
        required: false
        default: "6"
      target-milliseconds:
        description: Minimum CPU milliseconds used during calibration
        required: false
        default: "250"
  schedule:
    - cron: "23 3 * * 1"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cross-runtime-performance.yml"
      - "benchmarks/cross-runtime/**"
      - "benchmarks/Lunil.Runtime.CrossRuntimeBenchmarks/**"
      - "scripts/Install-CrossRuntimeBenchmarkTools.ps1"
      - "scripts/Measure-CrossRuntimePerformance.ps1"
      - "scripts/Merge-CrossRuntimePerformanceEvidence.ps1"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/cross-runtime-performance.yml"
      - "benchmarks/cross-runtime/**"
      - "benchmarks/Lunil.Runtime.CrossRuntimeBenchmarks/**"
      - "scripts/Install-CrossRuntimeBenchmarkTools.ps1"
      - "scripts/Measure-CrossRuntimePerformance.ps1"
      - "scripts/Merge-CrossRuntimePerformanceEvidence.ps1"

permissions:
  contents: read

concurrency:
  group: cross-runtime-performance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BENCHMARK_ROUNDS: ${{ inputs.rounds || '6' }}
  BENCHMARK_TARGET_MS: ${{ inputs.target-milliseconds || '250' }}

jobs:
  measure-full:
    name: Measure (${{ matrix.rid }})
    if: github.event_name == 'workflow_dispatch' && inputs.full-matrix
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: windows-latest
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: macos-15-intel
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/*.csproj"
      - name: Restore and build benchmark host
        run: >-
          dotnet build
          benchmarks/Lunil.Runtime.CrossRuntimeBenchmarks/Lunil.Runtime.CrossRuntimeBenchmarks.csproj
          --configuration Release
          -p:ContinuousIntegrationBuild=true
      - name: Build pinned native Lua and LuaJIT
        shell: pwsh
        run: >-
          ./scripts/Install-CrossRuntimeBenchmarkTools.ps1
          -RuntimeIdentifier '${{ matrix.rid }}'
      - name: Run lightweight performance smoke test (native Lua + Lunil Auto)
        if: github.event_name != 'workflow_dispatch' || !inputs.full-matrix
        shell: pwsh
        run: >-
          ./scripts/Measure-CrossRuntimePerformance.ps1
          -RuntimeIdentifier '${{ matrix.rid }}'
          -Workloads string_build
          -Engines lunil_auto
          -Rounds 2
          -TargetMilliseconds 100
          -Configuration Release -NoProvision -NoBuild -SkipReference
      - name: Run complete cross-runtime qualification
        if: github.event_name == 'workflow_dispatch' && inputs.full-matrix
        shell: pwsh
        run: >-
          ./scripts/Measure-CrossRuntimePerformance.ps1
          -RuntimeIdentifier '${{ matrix.rid }}'
          -Rounds $env:BENCHMARK_ROUNDS
          -TargetMilliseconds $env:BENCHMARK_TARGET_MS
          -Configuration Release -NoProvision -NoBuild
      - uses: actions/upload-artifact@v7
        with:
          name: cross-runtime-performance-${{ matrix.rid }}
          path: artifacts/cross-runtime-performance/${{ matrix.rid }}/**
          if-no-files-found: error
          retention-days: 30

  measure-smoke:
    name: Measure smoke (win-x64)
    if: github.event_name != 'workflow_dispatch' || !inputs.full-matrix
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/*.csproj"
      - name: Restore and build benchmark host
        run: >-
          dotnet build
          benchmarks/Lunil.Runtime.CrossRuntimeBenchmarks/Lunil.Runtime.CrossRuntimeBenchmarks.csproj
          --configuration Release
          -p:ContinuousIntegrationBuild=true
      - name: Build pinned native Lua and LuaJIT
        shell: pwsh
        run: ./scripts/Install-CrossRuntimeBenchmarkTools.ps1 -RuntimeIdentifier 'win-x64'
      - name: Run native + Lunil Auto smoke test
        shell: pwsh
        run: >-
          ./scripts/Measure-CrossRuntimePerformance.ps1
          -RuntimeIdentifier 'win-x64'
          -Workloads string_build
          -Engines lunil_auto
          -Rounds 2
          -TargetMilliseconds 100
          -Configuration Release -NoProvision -NoBuild -SkipReference
      - uses: actions/upload-artifact@v7
        with:
          name: cross-runtime-performance-smoke-win-x64
          path: artifacts/cross-runtime-performance/win-x64/**
          if-no-files-found: error
          retention-days: 14

  aggregate:
    name: Aggregate native-Lua and MoonSharp gates
    if: github.event_name == 'workflow_dispatch' && inputs.full-matrix
    needs: measure-full
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: cross-runtime-performance-*
          path: artifacts/cross-runtime-performance
      - name: Validate and merge all six RIDs
        shell: pwsh
        run: ./scripts/Merge-CrossRuntimePerformanceEvidence.ps1
      - uses: actions/upload-artifact@v7
        with:
          name: cross-runtime-performance-six-rid-report
          path: |
            artifacts/cross-runtime-performance/cross-runtime-six-rid-report.json
            artifacts/cross-runtime-performance/cross-runtime-six-rid-report.md
          if-no-files-found: error
          retention-days: 90
