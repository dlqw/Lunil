name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "perf/**"
      - "fix/**"
      - "release/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  change_scope:
    name: Determine change scope
    runs-on: ubuntu-latest
    outputs:
      heavy: ${{ steps.scope.outputs.heavy }}
      docs-only: ${{ steps.scope.outputs.docs-only }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Classify changed paths
        id: scope
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          $ErrorActionPreference = 'Stop'
          $zeroSha = '0000000000000000000000000000000000000000'
          if ($env:EVENT_NAME -eq 'workflow_dispatch') {
            $paths = @('workflow_dispatch')
          }
          elseif ($env:EVENT_NAME -eq 'pull_request') {
            $paths = @(git diff --name-only "$($env:BASE_SHA)...$($env:HEAD_SHA)")
          }
          elseif ($env:BEFORE_SHA -and $env:BEFORE_SHA -ne $zeroSha) {
            $paths = @(git diff --name-only $env:BEFORE_SHA $env:CURRENT_SHA)
          }
          else {
            $paths = @(git ls-tree -r --name-only $env:CURRENT_SHA)
          }
          if ($LASTEXITCODE -ne 0) {
            throw 'Unable to determine changed paths.'
          }
          if ($paths.Count -eq 0) {
            throw 'No changed paths were reported; refusing to classify the run as documentation-only.'
          }

          $lightOnly = $true
          foreach ($path in $paths) {
            # The chart generator only transforms checked-in benchmark data into SVG assets; it
            # does not compile product code or alter benchmark workloads. Keep chart/documentation
            # changes on the lightweight documentation boundary while retaining full validation for
            # all other scripts and build inputs.
            $isChartGenerator = $path -eq 'scripts/New-PerformanceCharts.ps1'
            $isLightPath = $isChartGenerator -or
              $path -match '^(docs/|changelogs/|assets/performance/|benchmarks/results/|README\.md$|README\.zh-CN\.md$|\.github/pull_request_template\.md$)'
            if (-not $isLightPath) {
              $lightOnly = $false
              Write-Host "Full validation required by: $path"
            }
          }
          $docsOnly = $lightOnly -and $env:EVENT_NAME -ne 'workflow_dispatch'
          $heavy = -not $docsOnly
          "heavy=$($heavy.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "docs-only=$($docsOnly.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          Write-Host "Change scope: heavy=$heavy; docs-only=$docsOnly"

  build-and-test:
    name: Build and test (${{ matrix.os }})
    needs: change_scope
    if: needs.change_scope.outputs.heavy == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: windows-latest
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: macos-15-intel
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/*.csproj"
      - name: Restore
        run: dotnet restore Lunil.sln
      - name: Build
        run: dotnet build Lunil.sln --configuration Release --no-restore -p:ContinuousIntegrationBuild=true
      - name: Test
        run: >-
          dotnet test Lunil.sln --configuration Release --no-build --no-restore
          --filter "FullyQualifiedName!~Lunil.Conformance.Tests&FullyQualifiedName!~Lunil.BackendDifferential.Tests&FullyQualifiedName!~Lunil.Stability.Tests"
      - name: Run conformance, five-backend differential, and deterministic stability gates
        shell: pwsh
        run: >-
          ./scripts/New-ConformanceEvidence.ps1
          -RuntimeIdentifier '${{ matrix.rid }}'
          -Configuration Release -NoBuild -NoRestore
      - name: Publish and run NativeAOT fixture
        shell: pwsh
        run: ./scripts/Test-NativeAotFixture.ps1 -RuntimeIdentifier '${{ matrix.rid }}'
      - name: Publish and run NativeAOT CLI
        shell: pwsh
        run: ./scripts/Test-LunilCliPublish.ps1 -RuntimeIdentifier '${{ matrix.rid }}' -Modes NativeAot
      - name: Verify single-file, trimming, and ReadyToRun modes
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: ./scripts/Test-LunilPublishModes.ps1 -RuntimeIdentifier '${{ matrix.rid }}'
      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = ./scripts/Get-LunilVersion.ps1
          "value=$version" >> $env:GITHUB_OUTPUT
      - name: Build native-platform bundle
        shell: pwsh
        run: ./scripts/New-ReleaseBundle.ps1 -RuntimeIdentifier '${{ matrix.rid }}' -Version '${{ steps.version.outputs.value }}'
      - name: Record execution backend benchmark trend
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force 'artifacts/benchmarks' | Out-Null
          dotnet run --project benchmarks/Lunil.Runtime.Benchmarks/Lunil.Runtime.Benchmarks.csproj `
            --configuration Release --no-build -- 1000000 |
            Tee-Object -FilePath 'artifacts/benchmarks/${{ matrix.rid }}.txt'
      - name: Record repeated Tier 1, Tier 2, and Loop OSR evidence
        if: >-
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        shell: pwsh
        run: ./scripts/Measure-BackendPerformance.ps1 -Rounds 6 -ColdSamples 9 -Iterations 1000000 -Configuration Release -NoBuild
      - uses: actions/upload-artifact@v7
        if: >-
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        with:
          name: backend-performance-${{ matrix.rid }}
          path: artifacts/backend-performance/**
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: conformance-evidence-${{ matrix.rid }}
          path: artifacts/conformance/**
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: lunil-${{ matrix.rid }}
          path: |
            artifacts/*.zip
            artifacts/benchmarks/*.txt
            artifacts/nativeaot/${{ matrix.rid }}/**
            if-no-files-found: error

  docs-only-build-test-contexts:
    name: Build and test (${{ matrix.os }})
    if: needs.change_scope.outputs.docs-only == 'true'
    needs: change_scope
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ubuntu-latest
    steps:
      - name: Document the intentional lightweight path
        run: echo "Documentation-only change; build and test are intentionally skipped."

  backend-performance-decision:
    name: Aggregate Tier 1/Tier 2/Loop OSR six-RID evidence
    if: >-
      needs.change_scope.outputs.heavy == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    needs:
      - change_scope
      - build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: backend-performance-*
          path: artifacts/backend-performance
          merge-multiple: true
      - name: Aggregate evidence without enforcing timing on shared runners
        shell: pwsh
        run: ./scripts/Merge-BackendPerformanceEvidence.ps1
      - uses: actions/upload-artifact@v7
        with:
          name: backend-performance-six-rid-decision
          path: artifacts/backend-performance/*-six-rid-decision.json
          if-no-files-found: error

  conformance-evidence-decision:
    name: Aggregate conformance and stability six-RID evidence
    needs:
      - change_scope
      - build-and-test
    if: needs.change_scope.outputs.heavy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: conformance-evidence-*
          path: artifacts/conformance
          merge-multiple: true
      - name: Require all six RIDs to satisfy the same pinned contracts
        shell: pwsh
        run: ./scripts/Merge-ConformanceEvidence.ps1
      - uses: actions/upload-artifact@v7
        with:
          name: conformance-six-rid-evidence
          path: artifacts/conformance/conformance-six-rid-evidence.json
          if-no-files-found: error

  formatting-and-packages:
    name: Formatting and packages
    needs: change_scope
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify public repository boundaries
        shell: pwsh
        run: ./scripts/Test-PublicRepository.ps1
      - name: Verify community documentation boundaries
        shell: pwsh
        run: ./scripts/Test-CommunityDocumentation.ps1
      - name: Verify generated performance charts
        shell: pwsh
        run: |
          ./scripts/New-PerformanceCharts.ps1 -Verify
          ./scripts/New-PerformanceCharts.ps1 -DataPath benchmarks/results/0.9.0-alpha.5-performance.json -Verify
          ./scripts/New-PerformanceCharts.ps1 -DataPath benchmarks/results/0.9.0-performance.json -Verify
          ./scripts/New-PerformanceCharts.ps1 -DataPath benchmarks/results/0.10.0-performance.json -Verify
      - uses: actions/setup-dotnet@v6
        if: needs.change_scope.outputs.heavy == 'true'
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/*.csproj"
      - name: Restore
        if: needs.change_scope.outputs.heavy == 'true'
        run: dotnet restore Lunil.sln
      - name: Restore public API baseline tool
        if: needs.change_scope.outputs.heavy == 'true'
        run: dotnet tool restore
      - name: Verify formatting
        if: needs.change_scope.outputs.heavy == 'true'
        run: dotnet format Lunil.sln --verify-no-changes --no-restore
      - name: Read version
        id: version
        if: needs.change_scope.outputs.heavy == 'true'
        shell: pwsh
        run: |
          $version = ./scripts/Get-LunilVersion.ps1
          "value=$version" >> $env:GITHUB_OUTPUT
      - name: Build NuGet packages
        if: needs.change_scope.outputs.heavy == 'true'
        shell: pwsh
        run: ./scripts/New-NuGetPackages.ps1 -Version '${{ steps.version.outputs.value }}'
      - name: Verify frozen public APIs
        if: needs.change_scope.outputs.heavy == 'true'
        shell: pwsh
        run: ./scripts/Test-PublicApiBaselines.ps1 -Configuration Release -NoBuild -NoRestore
      - name: Verify package compatibility and local consumers
        if: needs.change_scope.outputs.heavy == 'true'
        shell: pwsh
        run: >-
          ./scripts/Test-PackageCompatibility.ps1
          -Version '${{ steps.version.outputs.value }}'
          -PackageDirectory artifacts/packages -NoPack
      - name: Install and smoke-test CLI tool package
        if: needs.change_scope.outputs.heavy == 'true'
        shell: pwsh
        run: ./scripts/Test-LunilCliPackage.ps1 -Version '${{ steps.version.outputs.value }}'
      - uses: actions/upload-artifact@v7
        if: needs.change_scope.outputs.heavy == 'true'
        with:
          name: lunil-nuget
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error

