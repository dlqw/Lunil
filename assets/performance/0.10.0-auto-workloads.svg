<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="780" viewBox="0 0 1120 780" role="img" aria-labelledby="title desc">
  <title id="title">Lunil 0.10.0 Auto JIT by workload</title>
  <desc id="desc">Auto JIT speedup per workload across six release platforms, normalized to PUC Lua 5.4.8.</desc>
  <rect width="1120" height="780" rx="20" fill="#f8fafc"/>
  <text x="56" y="64" font-family="Inter,Segoe UI,sans-serif" font-size="28" font-weight="700" fill="#0f172a">Auto JIT by workload</text>
  <text x="56" y="94" font-family="Inter,Segoe UI,sans-serif" font-size="15" fill="#475569">Lunil 0.10.0 · six-RID geometric mean · PUC Lua 5.4.8 = 1.000×</text>
  <line x1="250.0" y1="126" x2="250.0" y2="532" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 5"/>
  <text x="250.0" y="552" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#64748b">0.0×</text>
  <line x1="445.0" y1="126" x2="445.0" y2="532" stroke="#0f766e" stroke-width="1"/>
  <text x="445.0" y="552" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#64748b">1.0×</text>
  <line x1="640.0" y1="126" x2="640.0" y2="532" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 5"/>
  <text x="640.0" y="552" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#64748b">2.0×</text>
  <line x1="835.0" y1="126" x2="835.0" y2="532" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 5"/>
  <text x="835.0" y="552" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#64748b">3.0×</text>
  <line x1="1030.0" y1="126" x2="1030.0" y2="532" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 5"/>
  <text x="1030.0" y="552" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#64748b">4.0×</text>
  <text x="226" y="142" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="15" font-weight="600" fill="#1e293b">Arithmetic</text>
  <rect x="250" y="124" width="258.0" height="26" rx="6" fill="#6d28d9"/>
  <text x="517.7" y="142" font-family="Inter,Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#0f172a">1.321×</text>
  <text x="226" y="190" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="15" font-weight="600" fill="#1e293b">Iterative Fibonacci</text>
