  <text x="884.6" y="190" font-family="Inter,Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#0f172a">3.203×</text>
  <text x="226" y="238" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="15" font-weight="600" fill="#1e293b">Mandelbrot</text>
  <rect x="250" y="220" width="651.0" height="26" rx="6" fill="#6d28d9"/>
  <text x="911.2" y="238" font-family="Inter,Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#0f172a">3.339×</text>
  <text x="226" y="286" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="15" font-weight="600" fill="#1e293b">Control flow</text>
  <rect x="250" y="268" width="324.0" height="26" rx="6" fill="#6d28d9"/>
  <text x="583.9" y="286" font-family="Inter,Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#0f172a">1.661×</text>
  <text x="226" y="334" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="15" font-weight="600" fill="#1e293b">Function calls</text>
  <rect x="250" y="316" width="554.0" height="26" rx="6" fill="#6d28d9"/>
  <text x="813.6" y="334" font-family="Inter,Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#0f172a">2.839×</text>
  <text x="226" y="382" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="15" font-weight="600" fill="#1e293b">Table access</text>
